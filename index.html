<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub Operacional</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <header class="topbar">
    <div class="brand">
      <span class="logo">●</span>
      <div>
        <h1>Hub Operacional</h1>
        <p>Sua central de conhecimento da operação</p>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <h2>Olá, Larissa 👋</h2>
      <p>O que você deseja acessar hoje?</p>

      <input 
        class="search"
        type="text"
        placeholder="Pesquisar treinamentos, POPs ou processos..."
      >
    </section>

    <section class="grid-areas">
      <div class="area-card">📦 <h3>Outbound</h3></div>
      <div class="area-card">📥 <h3>Inbound</h3></div>
      <div class="area-card">🏭 <h3>MWH</h3></div>
      <div class="area-card">🚛 <h3>Retiros</h3></div>
      <div class="area-card">📋 <h3>CIE</h3></div>
      <div class="area-card">✅ <h3>ICQA</h3></div>
      <div class="area-card">🔧 <h3>Manutenção</h3></div>
      <div class="area-card">♻️ <h3>RC</h3></div>
      <div class="area-card">🎓 <h3>Training</h3></div>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
